name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # Built from source with this job's Go, so its toolchain is never older
      # than the go.mod target (a prebuilt binary refuses that).
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          golangci-lint run ./...

      - name: go test
        run: go test -race ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: build
        run: CGO_ENABLED=0 go build ./cmd/meerkat

  # The binary has to cross-compile to the boxes it actually runs on, and with
  # CGO off: modernc.org/sqlite is pure Go precisely so a router needs no
  # toolchain. A build tag that only compiles on Linux/amd64 is exactly what the
  # test job above would never notice.
  cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          check-latest: true

      - name: cross-compile
        run: |
          for t in linux/amd64 linux/arm64 linux/arm freebsd/amd64 darwin/arm64; do
            echo "building $t"
            CGO_ENABLED=0 GOOS=${t%/*} GOARCH=${t#*/} go build -o /dev/null ./cmd/meerkat
          done

  # The packaging is how meerkat actually reaches a router, so it is built and
  # installed on every change rather than discovered broken at tag time.
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          check-latest: true

      - name: build .deb/.rpm/.apk
        env:
          NFPM_VERSION: "2.47.0"
        run: |
          curl -sSfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /tmp nfpm
          NFPM="/tmp/nfpm" sh deploy/build-packages.sh 0.0.0-ci
          ls -la dist

      - name: the .deb must install and the binary must run
        run: |
          # Globbed, not spelled out: nfpm rewrites a prerelease into Debian's
          # ordering convention (0.0.0-ci becomes 0.0.0~ci), so the filename is
          # not the version string that went in.
          deb=$(ls dist/meerkat_*_amd64.deb)
          echo "installing $deb"
          sudo apt-get install -y "./$deb"
          meerkat version
          # doctor exits non-zero on a runner with no Suricata, by design; this
          # only checks that it runs and says why rather than crashing.
          meerkat doctor || true
