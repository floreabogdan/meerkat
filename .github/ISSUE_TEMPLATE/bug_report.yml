name: Bug report
description: Something in meerkat behaves incorrectly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include the versions and the `meerkat doctor` output
        below — they save a round-trip, because most of what goes wrong is a permission on
        `eve.json` or a path that does not point where you think. **Do not report security
        issues here** — see [SECURITY.md](https://github.com/floreabogdan/meerkat/blob/main/SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce, and the difference between expected and actual behaviour.
    validations:
      required: true
  - type: input
    id: meerkat-version
    attributes:
      label: meerkat version
      description: Output of `meerkat version`.
      placeholder: "meerkat v0.1.0"
    validations:
      required: true
  - type: input
    id: suricata-version
    attributes:
      label: Suricata version
      description: Output of `suricata --build-info | head -1`, or your Suricata package version.
      placeholder: "Suricata 7.0.10"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which part?
      options:
        - "Ingest — reading eve.json"
        - "Enrichment — country / ASN / city"
        - "The console — sources, source detail, filters"
        - "Blocking — nftably"
        - "Rules — the Suricata ruleset"
        - "Threat map publishing"
        - "Install / packaging / systemd"
        - "Something else"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`meerkat doctor` output"
      description: Run it as the user meerkat runs as (`sudo -u meerkat meerkat doctor`) and paste the output.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Any relevant lines from `journalctl -u meerkat`. Redact addresses and tokens.
      render: text
